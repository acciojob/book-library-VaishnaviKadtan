<!DOCTYPE html>
<html>
<head>
    <title>Book Library</title>
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px 0;
        }

        .book-library {
            background-color: #ffffff;
            width: 80%;
            margin: 20px auto;
            padding: 20px 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .book {
            padding: 30px 40px;
            border-bottom: 15px solid #f2f2f2;
        }

        .book:last-child {
            border-bottom: none;
        }

        .book img {
            display: block;
            margin: 0 auto 20px auto;
            height: 300px;
        }

        .book h2 {
            margin: 10px 0 5px;
        }

        .author {
            color: #777777;
            margin-bottom: 15px;
        }

        .price {
            background-color: #2ecc71;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>

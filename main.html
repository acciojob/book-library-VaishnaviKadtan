<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Body Styling */
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Library Container */
        .book-library {
            background-color: #ffffff;
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Individual Book Block */
        .book {
            width: 250px;
            background-color: #fafafa;
            margin: 15px;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.05);
        }

        .book img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
        }

        .book h3 {
            margin: 10px 0 5px;
        }

        .author {
            color: #777777;
            margin-bottom: 10px;
        }

        .price {
            background-color: #2ecc71;
            color: white;
            padding: 5px 10px;
            display: inline-block;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="book-library">
        
        <!-- Book 1 -->
        <div class="book">
            <img src="https://via.placeholder.com/250x300" alt="Spy in the Amber">
            <h3>Spy in the Amber</h3>
            <p class="author">by Manohar Malgonkar</p>
            <div class="price">$15.00</div>
        </div>

        <!-- Book 2 -->
        <div class="book">
            <img src="https://via.placeholder.com/250x300" alt="Sacred Games">
            <h3>Sacred Games</h3>
            <p class="author">by Vikram Chandra</p>
            <div class="price">$18.00</div>
        </div>

        <!-- Book 3 -->
        <div class="book">
            <img src="https://via.placeholder.com/250x300" alt="Byomkesh Bakshi">
            <h3>Byomkesh Bakshi</h3>
            <p class="author">by Sharadindu Bandyopadhyay</p>
            <div class="price">$12.00</div>
        </div>

    </div>

</body>
</html>
